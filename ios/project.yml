name: AskMaps
options:
  bundleIdPrefix: com.askmaps
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  AskMaps:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AskMaps
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.askmaps.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: AskMaps/Resources/Info.plist
